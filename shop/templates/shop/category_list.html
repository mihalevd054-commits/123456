{% extends 'shop/base.html' %}

{% block title %}Категории игр{% endblock %}

{% block content %}
    <h1>Категории</h1>
    <div class="card-grid">
        {% for cat in categories %}
            <div class="card">
                <div class="card-content">
                    <h3>{{ cat.name }}</h3>
                    <p>{{ cat.description|truncatechars:100 }}</p>
                    <a href="{% url 'category_games' cat.slug %}" class="btn">Смотреть игры</a>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
