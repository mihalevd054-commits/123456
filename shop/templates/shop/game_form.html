{% extends 'shop/base.html' %}

{% block title %}{% if object %}Редактировать игру{% else %}Добавить игру{% endif %}{% endblock %}

{% block content %}
    <h1>{% if object %}Редактирование игры{% else %}Новая игра{% endif %}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Сохранить</button>
        <a href="{% if object %}{% url 'game_detail' object.slug %}{% else %}{% url 'home' %}{% endif %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
